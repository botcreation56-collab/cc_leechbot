services:
  - type: web
    name: ccs-bot
    env: python
    region: singapore   # change to your preferred region
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: BOT_TOKEN
        sync: false           # fill in Render dashboard
      - key: ADMIN_IDS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DOMAIN
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

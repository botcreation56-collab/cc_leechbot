<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Files - FileBot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/css/styles.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles (Shared) */
        .sidebar {
            width: 260px;
            background: rgba(22, 27, 34, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            flex-shrink: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            margin-bottom: 40px;
            text-decoration: none;
        }

        .brand span {
            font-size: 24px;
            color: #0096FF;
        }

        .nav-menu {
            list-style: none;
            flex: 1;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(0, 150, 255, 0.1);
            color: #0096FF;
        }

        .nav-icon {
            width: 20px;
            text-align: center;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            max-width: 1600px;
            min-width: 0;
        }

        /* Toolbar */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-bar {
            background: rgba(33, 38, 45, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            width: 300px;
            outline: none;
            font-family: inherit;
        }

        .search-bar:focus {
            border-color: #0096FF;
        }

        /* Table */
        .table-card {
            background: rgba(33, 38, 45, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            color: #8b949e;
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
        }

        .data-table td {
            padding: 16px;
            color: #e6edf3;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-action {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
            margin-right: 4px;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-danger:hover {
            background: rgba(248, 81, 73, 0.2);
            border-color: #ff7b72;
            color: #ff7b72;
        }

        /* Responsive elements handled uniquely by myfiles.html */
        @media (max-width: 600px) {

            .page-header {
                flex-direction: column;
                gap: 16px;
                align-items: stretch;
            }

            .search-bar {
                width: 100%;
            }

            .data-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
    <link rel="stylesheet" href="/static/css/responsive.css">
</head>

<body class="theme-dark">
    <div class="layout">
        <!-- Main Content -->
        <main class="main-content">

            <div class="page-header">
                <h1 style="color: white; font-size: 24px; font-weight: 600;">My Files</h1>
                <input type="text" id="search-input" class="search-bar" placeholder="Search files...">
            </div>

            <!-- Files Table -->
            <div class="table-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Size</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="files-tbody">
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 40px; color: #8b949e;">
                                Loading files...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
        if (!auth.isAuthenticated()) window.location.href = '../login.html';

        let allFiles = [];

        async function apiFetch(path, opts = {}) {
            const r = await fetch(path, {
                ...opts,
                headers: { 'Authorization': 'Bearer ' + auth.token, ...(opts.headers || {}) }
            });
            return r;
        }

        async function loadFiles() {
            const tbody = document.getElementById('files-tbody');
            try {
                const r = await apiFetch('/api/admin/users/me/files');
                let files = [];
                if (r.ok) { files = await r.json(); }

                allFiles = files; // Cache for search
                renderFiles(allFiles);
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:40px;color:#8b949e;">Failed to load files.</td></tr>`;
                console.error("File load error:", e);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            loadFiles();
        });

        function renderFiles(files) {
            const tbody = document.getElementById('files-tbody');
            tbody.innerHTML = '';

            if (files.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:30px;">No files found</td></tr>`;
                return;
            }

            files.forEach(file => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="font-weight: 500; color: white;">${file.filename || file.file_id}</div>
                        <div style="font-size: 11px; color: #8b949e;">ID: ${file.file_id}</div>
                    </td>
                    <td>${file.file_size ? (file.file_size / 1048576).toFixed(1) + ' MB' : '-'}</td>
                    <td>${file.created_at ? new Date(file.created_at).toLocaleDateString() : '-'}</td>
                    <td>
                        <button class="btn-action" onclick="window.open('/api/watch/${file.file_id}', '_blank')">Watch</button>
                        <button class="btn-action" onclick="window.open('/api/download/${file.file_id}', '_blank')">Download</button>
                        <button class="btn-action btn-danger">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Search Filter
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allFiles.filter(f => (f.filename || f.file_id).toLowerCase().includes(term));
            renderFiles(filtered);
        });

        // --- Mobile Sidebar Toggle ---
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                const sidebar = document.getElementById('sidebar');
                if (sidebar?.classList.contains('open')) toggleSidebar();
            }
        });
    </script>
<script src="/static/js/common.js"></script>
    <script>injectSidebar("myfiles");</script>
</body>

</html>

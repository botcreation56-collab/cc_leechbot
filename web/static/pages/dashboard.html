<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - FileBot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/css/styles.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 260px;
            background: rgba(22, 27, 34, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            flex-shrink: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            margin-bottom: 40px;
            text-decoration: none;
        }

        .brand span {
            font-size: 24px;
            color: #0096FF;
        }

        .nav-menu {
            list-style: none;
            flex: 1;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(0, 150, 255, 0.1);
            color: #0096FF;
        }

        .nav-icon {
            width: 20px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            max-width: 1600px;
            min-width: 0;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(33, 38, 45, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #0096FF;
            opacity: 0.5;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: white;
        }

        .stat-meta {
            font-size: 12px;
            color: #8b949e;
            margin-top: 6px;
        }

        /* Recent Files Table */
        .table-section {
            background: rgba(33, 38, 45, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            color: #8b949e;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-table td {
            padding: 16px;
            color: #e6edf3;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-active {
            background: rgba(46, 160, 67, 0.15);
            color: #3fb950;
            border: 1px solid rgba(46, 160, 67, 0.4);
        }

        .status-expired {
            background: rgba(248, 81, 73, 0.15);
            color: #ff7b72;
            border: 1px solid rgba(248, 81, 73, 0.4);
        }

        /* Responsive handled globally by responsive.css */
    </style>
    <link rel="stylesheet" href="/static/css/responsive.css">
</head>

<body class="theme-dark">

    <!-- Hamburger button (mobile only) -->
    <button class="hamburger" id="hamburger-btn" aria-label="Open menu" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </button>

    <!-- Sidebar backdrop overlay -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>

    <div class="layout">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <a href="./dashboard.html" class="brand">
                <span>⚡</span>
                <div class="brand-text">FileBot</div>
            </a>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="./dashboard.html" class="nav-link active">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./myfiles.html" class="nav-link">
                        <span class="nav-icon">📂</span>
                        <span class="nav-text">My Files</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./settings.html" class="nav-link">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text">Settings</span>
                    </a>
                </li>
                <!-- Admin link — hidden by default, shown via JS if user is admin -->
                <li class="nav-item" id="admin-nav-item" style="display:none;">
                    <a href="/admin.html" class="nav-link" style="color:#ff4444;">
                        <span class="nav-icon">🛡️</span>
                        <span class="nav-text">Admin Panel</span>
                    </a>
                </li>
            </ul>

            <button onclick="doLogout()" class="nav-link"
                style="background: none; border: none; width: 100%; color: #ff7b72; margin-top: auto; cursor: pointer;">
                <span class="nav-icon">🚪</span>
                <span class="nav-text">Logout</span>
            </button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Welcome Header -->
            <div style="margin-bottom: 30px;">
                <h1 style="color: white; font-size: 24px; font-weight: 600;">Welcome Back</h1>
                <p style="color: #8b949e; font-size: 14px; margin-top: 4px;">Here's what's happening with your files.
                </p>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Files</div>
                    <div class="stat-value" id="stat-files">-</div>
                    <div class="stat-meta" id="stat-files-meta">Loading...</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Storage Used</div>
                    <div class="stat-value" id="stat-storage">-</div>
                    <div class="stat-meta" id="stat-storage-meta">Loading...</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Plan</div>
                    <div class="stat-value" id="stat-plan">-</div>
                    <div class="stat-meta" id="stat-plan-meta">Loading...</div>
                </div>
            </div>

            <!-- Recent Files -->
            <div class="table-section">
                <div class="section-header">
                    <div class="section-title">Recent Uploads</div>
                    <a href="./myfiles.html" class="nav-link" style="color: #0096FF; padding: 0;">View All →</a>
                </div>

                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>File Name</th>
                                <th>Size</th>
                                <th>Uploaded</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="files-tbody">
                            <!-- JS will populate -->
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 40px; color: #8b949e;">
                                    Loading data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
        let filesObserver = null;
        let statsLoaded = false;
        const FILES_PER_PAGE = 10;
        let currentPage = 0;
        let hasMoreFiles = true;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-backdrop').classList.toggle('show');
            const btn = document.getElementById('hamburger-btn');
            if (btn) btn.classList.toggle('open');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                const sidebar = document.getElementById('sidebar');
                if (sidebar.classList.contains('open')) toggleSidebar();
            }
        });

        const token = localStorage.getItem('filebot_token');
        if (!token) { window.location.href = '../login.html'; }

        function doLogout() {
            localStorage.removeItem('filebot_token');
            window.location.href = '../login.html';
        }

        async function apiFetch(path, opts = {}) {
            const r = await fetch(path, {
                ...opts,
                headers: { 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) }
            });
            return r;
        }

        async function checkAdminRole() {
            try {
                const r = await apiFetch('/api/admin/dashboard');
                if (r.status === 200) {
                    document.getElementById('admin-nav-item').style.display = 'block';
                }
            } catch (e) { }
        }

        async function loadStats() {
            if (statsLoaded) return;
            try {
                const r = await apiFetch('/api/user/settings/stats');
                if (r.ok) {
                    const stats = await r.json();
                    statsLoaded = true;
                    
                    document.getElementById('stat-files').textContent = stats.total_files || 0;
                    document.getElementById('stat-files-meta').textContent = 'Active uploads';
                    
                    const storageUsedGB = ((stats.storage_used || 0) / (1024 * 1024 * 1024)).toFixed(2);
                    document.getElementById('stat-storage').textContent = storageUsedGB + ' GB';
                    document.getElementById('stat-storage-meta').textContent = `Of ${stats.storage_limit_gb || 5} GB limit`;
                    
                    const planName = (stats.plan || 'free').toUpperCase();
                    document.getElementById('stat-plan').textContent = planName;
                    document.getElementById('stat-plan-meta').textContent = `Max file: ${stats.max_file_size_gb || 5} GB`;
                }
            } catch (e) {
                document.getElementById('stat-files').textContent = '?';
                document.getElementById('stat-storage').textContent = '?';
                document.getElementById('stat-plan').textContent = '?';
            }
        }

        function formatFileSize(bytes) {
            if (bytes >= 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
            if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / 1024).toFixed(1) + ' KB';
        }

        function createFileRow(f) {
            const expired = f.status === 'expired';
            const tr = document.createElement('tr');
            tr.className = 'file-row';
            tr.innerHTML = `
                <td><div style="font-weight:500;color:white;">${f.filename || f.file_id || 'Unknown'}</div></td>
                <td>${f.file_size ? formatFileSize(f.file_size) : '-'}</td>
                <td>${f.created_at ? new Date(f.created_at).toLocaleDateString() : '-'}</td>
                <td><span class="status-badge ${expired ? 'status-expired' : 'status-active'}">${expired ? 'EXPIRED' : 'ACTIVE'}</span></td>
                <td><a href="/api/watch/${f.file_id}" style="color:#0096FF;text-decoration:none;font-size:13px;">View</a></td>
            `;
            return tr;
        }

        async function loadFiles(reset = false) {
            if (reset) {
                currentPage = 0;
                hasMoreFiles = true;
                document.getElementById('files-tbody').innerHTML = '';
            }

            if (!hasMoreFiles) return;

            const tbody = document.getElementById('files-tbody');
            const loadingRow = document.createElement('tr');
            loadingRow.id = 'loading-row';
            loadingRow.innerHTML = `<td colspan="5" style="text-align:center;padding:20px;color:#8b949e;">Loading more...</td>`;
            tbody.appendChild(loadingRow);

            try {
                const r = await apiFetch('/api/user/settings/myfiles');
                if (r.ok) {
                    const allFiles = await r.json();
                    const start = currentPage * FILES_PER_PAGE;
                    const pageFiles = allFiles.slice(start, start + FILES_PER_PAGE);
                    
                    document.getElementById('loading-row')?.remove();
                    
                    if (pageFiles.length === 0 && currentPage === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:#8b949e;">No files yet. Send a file to the bot!</td></tr>`;
                        hasMoreFiles = false;
                        return;
                    }
                    
                    pageFiles.forEach(f => {
                        tbody.appendChild(createFileRow(f));
                    });
                    
                    currentPage++;
                    if (start + FILES_PER_PAGE >= allFiles.length) {
                        hasMoreFiles = false;
                    }
                }
            } catch (e) {
                document.getElementById('loading-row')?.remove();
            }
        }

        function setupLazyLoading() {
            const tbody = document.getElementById('files-tbody');
            
            filesObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && hasMoreFiles && !document.getElementById('loading-row')) {
                        loadFiles();
                    }
                });
            }, { rootMargin: '100px' });
            
            const sentinel = document.createElement('tr');
            sentinel.id = 'lazy-sentinel';
            sentinel.style.height = '1px';
            tbody.parentNode.appendChild(sentinel);
            filesObserver.observe(sentinel);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            checkAdminRole();
            await loadStats();
            await loadFiles(true);
            setupLazyLoading();
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Downloading... - FileBot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f0f6fc;
            margin: 0;
        }

        .buffer-card {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Progress Bar */
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #0096FF, #00d4ff);
            width: 0%;
            transition: width 3s linear;
            /* Matches the 3s timeout */
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0, 150, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            font-size: 32px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 150, 255, 0.4);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 15px rgba(0, 150, 255, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 150, 255, 0);
            }
        }

        h2 {
            margin: 0 0 8px 0;
            font-weight: 600;
        }

        p {
            margin: 0;
            color: #8b949e;
            font-size: 14px;
            line-height: 1.5;
        }

        .timer-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            margin-top: 16px;
            display: inline-block;
        }
    </style>
</head>

<body>

    <div class="buffer-card">
        <div id="progress" class="progress-bar"></div>

        <div class="icon-circle">
            ⬇️
        </div>

        <h2>Starting Download</h2>
        <p>Securely retrieving your file...</p>

        <div class="timer-badge">
            Starting in <span id="timer">3</span>s
        </div>

        <p style="margin-top: 20px; font-size: 12px; opacity: 0.5;">
            FileBot Safe Transfer Protocol
        </p>
    </div>

    <script>
        const downloadUrl = "{{ stream_url }}";
        let count = 3;
        const timer = document.getElementById('timer');
        const progress = document.getElementById('progress');

        // Start animation force
        setTimeout(() => { progress.style.width = "100%"; }, 100);

        const countdown = setInterval(() => {
            count--;
            timer.innerText = count;
            if (count <= 0) {
                clearInterval(countdown);
                window.location.href = downloadUrl;
            }
        }, 1000);
    </script>
</body>

</html>
